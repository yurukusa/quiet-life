<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>quiet life</title>
<style>
* { margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
canvas { display: block; cursor: crosshair; }
#hint, #auto-hint {
  position: fixed; left: 0; right: 0;
  text-align: center; color: rgba(255,255,255,0.15);
  font: 12px/1 "Helvetica Neue", sans-serif; letter-spacing: 0.3em;
  pointer-events: none; transition: opacity 2s;
}
#hint { bottom: 24px; }
#auto-hint { top: 16px; opacity: 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">touch anywhere / double-tap or space for auto</div>
<div id="auto-hint"></div>
<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
let W, H;
const beings = [];
const MAX_BEINGS = 60;

function resize() {
  W = C.width = innerWidth;
  H = C.height = innerHeight;
}
resize();
addEventListener('resize', resize);

// simplex-like noise (fast & dirty)
function noise(x, y, t) {
  const s = Math.sin(x * 0.7 + t) * Math.cos(y * 0.5 - t * 0.3);
  const c = Math.cos(x * 0.3 - t * 0.7) * Math.sin(y * 0.9 + t * 0.5);
  return (s + c) * 0.5;
}

// each being is a unique creature with its own DNA
function createBeing(x, y) {
  const dna = Math.random();
  const hue = Math.random() * 360;
  const sat = 40 + Math.random() * 30;

  // creature type determined by dna
  let type;
  if (dna < 0.15) type = 'pulse';       // breathing light
  else if (dna < 0.30) type = 'orbit';   // orbital dancer
  else if (dna < 0.45) type = 'trail';   // ribbon swimmer
  else if (dna < 0.60) type = 'split';   // cell divider
  else if (dna < 0.75) type = 'spiral';  // spiral grower
  else if (dna < 0.88) type = 'wander';  // gentle wanderer
  else type = 'bloom';                    // flower bloom

  return {
    type, x, y, ox: x, oy: y,
    hue, sat,
    age: 0,
    lifespan: 400 + Math.random() * 800,
    size: 2 + Math.random() * 4,
    speed: 0.3 + Math.random() * 1.2,
    phase: Math.random() * Math.PI * 2,
    freq: 0.5 + Math.random() * 2,
    amplitude: 20 + Math.random() * 80,
    drift: { x: (Math.random() - 0.5) * 0.4, y: (Math.random() - 0.5) * 0.4 },
    trail: [],
    maxTrail: 30 + Math.floor(Math.random() * 50),
    children: [],
    petals: 5 + Math.floor(Math.random() * 8),
    spiralArms: 2 + Math.floor(Math.random() * 4),
  };
}

function alpha(b) {
  const fadeIn = Math.min(b.age / 60, 1);
  const fadeOut = Math.max(1 - (b.age - b.lifespan + 80) / 80, 0);
  return Math.min(fadeIn, fadeOut);
}

function drawBeing(b, t) {
  const a = alpha(b);
  if (a <= 0) return;

  const n = noise(b.x * 0.005, b.y * 0.005, t * 0.001);

  switch (b.type) {
    case 'pulse': {
      const breath = Math.sin(b.age * 0.03 * b.freq + b.phase) * 0.5 + 0.5;
      const r = b.size * (3 + breath * 8);
      const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, r);
      grad.addColorStop(0, `hsla(${b.hue + n * 30}, ${b.sat}%, 70%, ${a * 0.8})`);
      grad.addColorStop(0.5, `hsla(${b.hue + n * 30}, ${b.sat}%, 50%, ${a * 0.3})`);
      grad.addColorStop(1, `hsla(${b.hue + n * 30}, ${b.sat}%, 30%, 0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(b.x, b.y, r, 0, Math.PI * 2);
      ctx.fill();
      b.x += b.drift.x + n * 0.3;
      b.y += b.drift.y + Math.sin(b.age * 0.01) * 0.2;
      break;
    }

    case 'orbit': {
      const count = 3 + Math.floor(b.freq);
      for (let i = 0; i < count; i++) {
        const angle = (b.age * 0.02 * b.speed) + (i / count) * Math.PI * 2 + b.phase;
        const radius = b.amplitude * 0.4 * (0.8 + Math.sin(b.age * 0.008 + i) * 0.3);
        const px = b.ox + Math.cos(angle) * radius;
        const py = b.oy + Math.sin(angle) * radius;
        const s = b.size * (1 + Math.sin(b.age * 0.05 + i) * 0.3);
        ctx.fillStyle = `hsla(${b.hue + i * 40}, ${b.sat}%, 65%, ${a * 0.7})`;
        ctx.beginPath();
        ctx.arc(px, py, s, 0, Math.PI * 2);
        ctx.fill();

        // faint connection lines
        if (i > 0) {
          const prevAngle = (b.age * 0.02 * b.speed) + ((i - 1) / count) * Math.PI * 2 + b.phase;
          const prevR = b.amplitude * 0.4 * (0.8 + Math.sin(b.age * 0.008 + i - 1) * 0.3);
          ctx.strokeStyle = `hsla(${b.hue + i * 30}, ${b.sat - 10}%, 50%, ${a * 0.15})`;
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(b.ox + Math.cos(prevAngle) * prevR, b.oy + Math.sin(prevAngle) * prevR);
          ctx.lineTo(px, py);
          ctx.stroke();
        }
      }
      b.ox += b.drift.x * 0.5;
      b.oy += b.drift.y * 0.5;
      break;
    }

    case 'trail': {
      const angle = noise(b.x * 0.01, b.y * 0.01, t * 0.0005) * Math.PI * 2;
      b.x += Math.cos(angle) * b.speed + b.drift.x;
      b.y += Math.sin(angle) * b.speed + b.drift.y;
      b.trail.push({ x: b.x, y: b.y });
      if (b.trail.length > b.maxTrail) b.trail.shift();

      // draw trail segments with gradual fade
      if (b.trail.length > 2) {
        for (let i = 1; i < b.trail.length - 1; i++) {
          const segAlpha = (i / b.trail.length) * a * 0.5;
          const segHue = b.hue + (b.age + i) * 0.1;
          ctx.strokeStyle = `hsla(${segHue}, ${b.sat}%, 60%, ${segAlpha})`;
          ctx.lineWidth = b.size * 0.5 * (i / b.trail.length);
          ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(b.trail[i - 1].x, b.trail[i - 1].y);
          const xc = (b.trail[i].x + b.trail[i + 1].x) / 2;
          const yc = (b.trail[i].y + b.trail[i + 1].y) / 2;
          ctx.quadraticCurveTo(b.trail[i].x, b.trail[i].y, xc, yc);
          ctx.stroke();
        }
      }

      // head glow
      const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.size * 3);
      grad.addColorStop(0, `hsla(${b.hue}, ${b.sat}%, 75%, ${a * 0.6})`);
      grad.addColorStop(1, `hsla(${b.hue}, ${b.sat}%, 50%, 0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.size * 3, 0, Math.PI * 2);
      ctx.fill();
      break;
    }

    case 'split': {
      if (b.age % 120 === 0 && b.children.length < 6) {
        const angle = Math.random() * Math.PI * 2;
        b.children.push({
          x: b.x, y: b.y,
          vx: Math.cos(angle) * 0.8,
          vy: Math.sin(angle) * 0.8,
          size: b.size * (0.5 + Math.random() * 0.3),
          hueOff: Math.random() * 60
        });
      }
      // draw parent
      const pr = b.size * (2 + Math.sin(b.age * 0.02) * 0.5);
      ctx.fillStyle = `hsla(${b.hue}, ${b.sat}%, 60%, ${a * 0.5})`;
      ctx.beginPath();
      ctx.arc(b.x, b.y, pr, 0, Math.PI * 2);
      ctx.fill();

      // draw & update children
      for (const ch of b.children) {
        ch.x += ch.vx + noise(ch.x * 0.01, ch.y * 0.01, t * 0.001) * 0.3;
        ch.y += ch.vy + noise(ch.y * 0.01, ch.x * 0.01, t * 0.001) * 0.3;
        ch.vx *= 0.995;
        ch.vy *= 0.995;

        ctx.fillStyle = `hsla(${b.hue + ch.hueOff}, ${b.sat}%, 65%, ${a * 0.6})`;
        ctx.beginPath();
        ctx.arc(ch.x, ch.y, ch.size, 0, Math.PI * 2);
        ctx.fill();

        // thread to parent
        ctx.strokeStyle = `hsla(${b.hue + ch.hueOff * 0.5}, ${b.sat}%, 50%, ${a * 0.08})`;
        ctx.lineWidth = 0.3;
        ctx.beginPath();
        ctx.moveTo(b.x, b.y);
        ctx.lineTo(ch.x, ch.y);
        ctx.stroke();
      }
      b.x += b.drift.x * 0.3;
      b.y += b.drift.y * 0.3;
      break;
    }

    case 'spiral': {
      for (let arm = 0; arm < b.spiralArms; arm++) {
        const armOffset = (arm / b.spiralArms) * Math.PI * 2;
        const points = Math.min(b.age * 0.5, 80);
        ctx.beginPath();
        for (let i = 0; i < points; i++) {
          const t2 = i / 80;
          const angle = t2 * Math.PI * 4 + b.age * 0.008 * b.speed + armOffset;
          const r = t2 * b.amplitude * 0.6;
          const px = b.x + Math.cos(angle) * r;
          const py = b.y + Math.sin(angle) * r;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.strokeStyle = `hsla(${b.hue + arm * 30 + b.age * 0.05}, ${b.sat}%, 55%, ${a * 0.4})`;
        ctx.lineWidth = b.size * 0.5;
        ctx.lineCap = 'round';
        ctx.stroke();
      }
      b.x += b.drift.x * 0.2;
      b.y += b.drift.y * 0.2;
      break;
    }

    case 'wander': {
      b.x += Math.sin(b.age * 0.007 * b.freq + b.phase) * b.speed + b.drift.x;
      b.y += Math.cos(b.age * 0.009 * b.freq + b.phase * 1.3) * b.speed * 0.7 + b.drift.y;

      // soft glowing body
      for (let layer = 3; layer >= 0; layer--) {
        const r = b.size * (1 + layer * 1.5);
        const lightness = 50 + layer * 8;
        ctx.fillStyle = `hsla(${b.hue + Math.sin(b.age * 0.01) * 20}, ${b.sat}%, ${lightness}%, ${a * 0.15 / (layer + 1)})`;
        ctx.beginPath();
        ctx.arc(b.x, b.y, r, 0, Math.PI * 2);
        ctx.fill();
      }

      // tiny sparkles around it
      for (let i = 0; i < 3; i++) {
        const angle = b.age * 0.03 + i * 2.1;
        const dist = b.size * 3 + Math.sin(b.age * 0.05 + i) * b.size;
        const sx = b.x + Math.cos(angle) * dist;
        const sy = b.y + Math.sin(angle) * dist;
        const ss = 0.5 + Math.sin(b.age * 0.1 + i * 1.7) * 0.3;
        ctx.fillStyle = `hsla(${b.hue + 60}, 80%, 80%, ${a * 0.4 * (0.5 + Math.sin(b.age * 0.08 + i) * 0.5)})`;
        ctx.beginPath();
        ctx.arc(sx, sy, ss, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }

    case 'bloom': {
      const openness = Math.min(b.age / 120, 1);
      const sway = Math.sin(b.age * 0.005) * 3;

      for (let i = 0; i < b.petals; i++) {
        const angle = (i / b.petals) * Math.PI * 2 + b.age * 0.003 + b.phase;
        const petalLen = b.amplitude * 0.3 * openness;
        const px = b.x + sway + Math.cos(angle) * petalLen;
        const py = b.y + Math.sin(angle) * petalLen;

        const grad = ctx.createRadialGradient(px, py, 0, px, py, b.size * 2);
        grad.addColorStop(0, `hsla(${b.hue + i * (360 / b.petals)}, ${b.sat + 10}%, 70%, ${a * 0.5})`);
        grad.addColorStop(1, `hsla(${b.hue + i * (360 / b.petals)}, ${b.sat}%, 40%, 0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.ellipse(px, py, b.size * 2, b.size * 4 * openness, angle, 0, Math.PI * 2);
        ctx.fill();
      }

      // center
      ctx.fillStyle = `hsla(${b.hue + 40}, 70%, 80%, ${a * 0.7})`;
      ctx.beginPath();
      ctx.arc(b.x + sway, b.y, b.size * 1.2, 0, Math.PI * 2);
      ctx.fill();

      b.x += b.drift.x * 0.15;
      b.y += b.drift.y * 0.15;
      break;
    }
  }
}

// birth flash — soft ring of light when a being is born
const flashes = [];
function birthFlash(x, y, hue) {
  flashes.push({ x, y, hue, age: 0, maxAge: 40 });
}

function drawFlashes() {
  for (let i = flashes.length - 1; i >= 0; i--) {
    const f = flashes[i];
    f.age++;
    const t = f.age / f.maxAge;
    const r = 10 + t * 30;
    const a = (1 - t) * 0.3;
    ctx.strokeStyle = `hsla(${f.hue}, 50%, 70%, ${a})`;
    ctx.lineWidth = 1 - t * 0.8;
    ctx.beginPath();
    ctx.arc(f.x, f.y, r, 0, Math.PI * 2);
    ctx.stroke();
    if (f.age >= f.maxAge) flashes.splice(i, 1);
  }
}

function spawn(x, y) {
  let b;
  if (beings.length >= MAX_BEINGS) {
    let oldest = 0;
    for (let i = 1; i < beings.length; i++) {
      if (beings[i].age > beings[oldest].age) oldest = i;
    }
    b = createBeing(x, y);
    beings[oldest] = b;
  } else {
    b = createBeing(x, y);
    beings.push(b);
  }
  birthFlash(x, y, b.hue);
}

// interaction
let hintShown = true;
function interact(x, y) {
  if (hintShown) {
    document.getElementById('hint').style.opacity = '0';
    hintShown = false;
  }
  spawn(x, y);
}

C.addEventListener('pointerdown', e => interact(e.clientX, e.clientY));
C.addEventListener('pointermove', e => {
  if (e.buttons > 0 && Math.random() < 0.08) {
    spawn(e.clientX, e.clientY);
  }
});

// auto mode
let autoMode = false;
let autoTimer = null;
const autoHint = document.getElementById('auto-hint');

function toggleAuto() {
  autoMode = !autoMode;
  if (autoMode) {
    autoHint.textContent = 'auto';
    autoHint.style.opacity = '0.15';
    if (hintShown) {
      document.getElementById('hint').style.opacity = '0';
      hintShown = false;
    }
    autoTimer = setInterval(() => {
      spawn(Math.random() * W, Math.random() * H);
    }, 600 + Math.random() * 800);
  } else {
    autoHint.style.opacity = '0';
    clearInterval(autoTimer);
  }
}

addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); toggleAuto(); }
});

// double-tap for mobile auto toggle
let lastTap = 0;
C.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTap < 300) { toggleAuto(); e.preventDefault(); }
  lastTap = now;
});

// main loop
let frame = 0;
function loop() {
  // subtle fade — slower decay leaves longer, more beautiful traces
  ctx.fillStyle = 'rgba(10, 10, 15, 0.04)';
  ctx.fillRect(0, 0, W, H);

  frame++;

  // light blending for overlapping glow
  ctx.globalCompositeOperation = 'lighter';

  for (let i = beings.length - 1; i >= 0; i--) {
    const b = beings[i];
    b.age++;
    drawBeing(b, frame);

    // remove dead beings
    if (b.age > b.lifespan + 80) {
      beings.splice(i, 1);
    }

    // wrap around edges gently
    if (b.x < -50) b.x = W + 50;
    if (b.x > W + 50) b.x = -50;
    if (b.y < -50) b.y = H + 50;
    if (b.y > H + 50) b.y = -50;
  }

  drawFlashes();

  ctx.globalCompositeOperation = 'source-over';

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
